/guilds:
  get:
    security:
      - bearerAuth: []
    tags:
      - 'guilds'
    summary: 'GET all the guilds of a Member'
    allOf:
      - $ref: '#/definitions/PaginateModelParameters'
    responses:
      allOf:
        - $ref: '#/definitions/UnauthorizedError'
        - $ref: '#/definitions/ForbiddenError'
        - $ref: '#/definitions/BadRequestError'
        - '200':
            content:
              application/json:
                schema:
                  allOf:
                    - $ref: '#/definitions/PaginateModel'
                  type: 'object'
                  properties:
                    rows:
                      type: 'array'
                      items:
                        type: 'object'
                        properties:
                          id:
                            type: 'integer'
                            description: 'Unique id'
                          isOwner:
                            type: 'boolean'
                          userId:
                            type: 'integer'
                          guildId:
                            type: 'integer'
                          createdAt:
                            type: 'string'
                            format: 'date-time'
                          updatedAt:
                            type: 'string'
                            format: 'date-time'
                          guild:
                            allOf:
                              - $ref: '#/definitions/Guild'
